apiVersion: apps/v1
kind: Deployment
metadata:
  name: zomato-deploy
  labels:
    app: zomato
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zomato
  template:
    metadata:
      labels:
        app: zomato
    spec:
      containers:
      - name: cont1
        image: anitalluri00/phishing-detection-qs
        ports:
          - containerPort: 5000 # Updated from 3000
---
apiVersion: v1
kind: Service
metadata:
  name: abc
spec:
  type: LoadBalancer
  selector:
    app: zomato
  ports:
    - port: 80           # The port the LoadBalancer listens on (standard for web)
      targetPort: 5000   # Forwards traffic to the container's port 5000
