apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: phd
  name: phd
spec:
  replicas: 5
  selector:
    matchLabels:
      app: phd
  template:
    metadata:
      labels:
        app: swiggy
    spec:
      containers:
      - name: cont1
        image: anitalluri00/phishing-detector
        ports:
          - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: phd
spec:
  type: LoadBalancer
  selector:
    app: phd
  ports:
    - port: 5000
