apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: phd
  name: phd-deploy
spec:
  selector:
    matchLabels:
      app: phd
  template:
    metadata:
      labels:
        app: phd
    spec:
      containers:
      - name: cont1
        image: anitalluri00/phishing-detection-ps
        ports:
          - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: abc
spec:
  type: LoadBalancer
  selector:
    app: phd
  ports:
    - port: 5000
